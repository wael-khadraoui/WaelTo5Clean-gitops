apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limit-plugin
plugin: rate-limiting
config:
  minute: 100
  policy: local
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-plugin
plugin: cors
config:
  origins: ["*"]
  methods: ["GET","POST","PUT","DELETE"]
  headers: ["Content-Type","Authorization"]
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: bot-detection-plugin
plugin: bot-detection
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ip-restriction-plugin
plugin: ip-restriction
config:
  allow: ["0.0.0.0/0"]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-backend-route
  annotations:
    konghq.com/plugins: "rate-limit-plugin,cors-plugin,bot-detection-plugin"
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
  - host: api.waelto5clean.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-svc
            port:
              number: {{ .Values.backend.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-frontend-route
  annotations:
    konghq.com/plugins: "rate-limit-plugin,cors-plugin"
spec:
  ingressClassName: kong
  rules:
  - host: app.waelto5clean.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port:
              number: {{ .Values.frontend.port }}
