apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-stable
  labels:
    app: backend
    track: stable
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
      track: stable
  template:
    metadata:
      labels:
        app: backend
        track: stable
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "waelto5clean"
        vault.hashicorp.com/agent-inject-secret-database: "secret/data/waelto5clean/database"
        vault.hashicorp.com/agent-inject-template-database: |
          {{`{{ with secret "secret/data/waelto5clean/database" }}
          export DB_HOST={{ .Data.data.host }}
          export DB_PORT={{ .Data.data.port }}
          export DB_NAME={{ .Data.data.dbname }}
          export DB_USER={{ .Data.data.username }}
          export DB_PASS={{ .Data.data.password }}
          {{ end }}`}}
    spec:
      serviceAccountName: default
      containers:
      - name: backend
        image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: NODE_ENV
          value: "production"
